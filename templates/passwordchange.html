{% extends "layout1.html" %}

{% block title %}
    Schimbă parola |     
    {% if user and user["gender"] == "F" %}
        Profa Eficientă
    {% else %}
        Proful Eficient
    {% endif %}
{% endblock %}

{% block main %}

<div class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 px-4 py-10 flex items-center justify-center">

    <div class="w-full max-w-lg bg-white border border-slate-700 rounded-3xl shadow-2xl p-8">

        <!-- header -->
        <div class="text-center mb-8">

            <h1 class="text-3xl font-bold text-slate-900 mb-2">
                Schimbă parola
            </h1>

            <p class="text-slate-600">
                Introdu parola curentă și noua parolă
            </p>

        </div>

        <!-- form -->
        <form action="/passwordchange" method="post" class="space-y-5">

            <!-- current password -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    Parola curentă
                </label>

                <input
                    type="password"
                    name="current_password"
                    required
                    placeholder="Parola curentă"
                    class="w-full rounded-2xl bg-white border border-slate-300 px-4 py-3 text-slate-900 focus:outline-none focus:ring-2 focus:ring-cyan-500"
                >
            </div>

            <!-- new password -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    Parola nouă
                </label>

                <input
                    type="password"
                    name="password"
                    required
                    placeholder="Parola nouă"
                    class="w-full rounded-2xl bg-white border border-slate-300 px-4 py-3 text-slate-900 focus:outline-none focus:ring-2 focus:ring-cyan-500"
                >
            </div>

            <!-- confirm password -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    Confirmă parola nouă
                </label>

                <input
                    type="password"
                    name="confirmation"
                    required
                    placeholder="Confirmă parola nouă"
                    class="w-full rounded-2xl bg-white border border-slate-300 px-4 py-3 text-slate-900 focus:outline-none focus:ring-2 focus:ring-cyan-500"
                >
            </div>

            <!-- submit -->
            <button
                type="submit"
                class="w-full rounded-2xl bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold py-4 transition"
            >
                Salvează parola nouă
            </button>

        </form>

        <!-- back -->
        <div class="text-center mt-6">
            <a href="/account" class="text-slate-500 hover:text-cyan-500 transition text-sm no-underline">
                ← Înapoi la cont
            </a>
        </div>

    </div>

</div>

{% endblock %}
