{% extends "layout1.html" %}

{% block title %}
    {{ t("register_title") }}
{% endblock %}

{% block main %}
<div class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 flex items-center justify-center px-4 py-10">

    <div class="w-full max-w-xl bg-slate-900/70 backdrop-blur-lg border border-slate-700 rounded-3xl shadow-2xl p-8">

        <div class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-white mb-2" data-i18n="register_heading">{{ t("register_heading") }}</h1>

            <p class="text-slate-400" data-i18n="register_subtitle">{{ t("register_subtitle") }}</p>
        </div>

        <form action="/register" method="post" class="space-y-5">

            <!-- Username -->
            <div>
                <label class="block text-sm text-slate-300 mb-2" data-i18n="fullname_label">{{ t("fullname_label") }}</label>

                <input
                    autocomplete="off"
                    autofocus
                    name="username"
                    placeholder="ex: Alexandra Lupulescu"
                    type="text"
                    required
                    class="w-full rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 text-white placeholder:text-slate-500 outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition"
                >
            </div>

            <!-- Email -->
            <div>
                <label class="block text-sm text-slate-300 mb-2" data-i18n="email_label">{{ t("email_label") }}</label>

                <input
                    autocomplete="off"
                    name="email"
                    placeholder="exemplu@gmail.com"
                    type="email"
                    required
                    class="w-full rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 text-white placeholder:text-slate-500 outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition"
                >
            </div>

            <!-- Liceu -->
            <div>
                <label class="block text-sm text-slate-300 mb-2" data-i18n="highschool_label">{{ t("highschool_label") }}</label>

                <input
                    autocomplete="off"
                    name="liceu"
                    placeholder="Colegiul National..."
                    type="text"
                    required
                    class="w-full rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 text-white placeholder:text-slate-500 outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition"
                >
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm text-slate-300 mb-2" data-i18n="password_label">{{ t("password_label") }}</label>

                <div class="relative">
                    <input
                        id="password"
                        name="password"
                        placeholder="Parola utilizator"
                        type="password"
                        required
                        class="w-full rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 pr-14 text-white placeholder:text-slate-500 outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition"
                    >

                    <button
                        type="button"
                        id="togglePassword"
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition"
                    >
                        👁
                    </button>
                </div>
            </div>

            <!-- Gender -->
            <div>
                <label class="block text-sm text-slate-300 mb-2" data-i18n="gender_label">{{ t("gender_label") }}</label>

                <select
                    name="gender"
                    required
                    class="w-full rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 text-white outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition"
                >
                    <option value="" data-i18n="select_default">{{ t("select_default") }}</option>
                    <option value="M" data-i18n="male">{{ t("male") }}</option>
                    <option value="F" data-i18n="female">{{ t("female") }}</option>
                </select>
            </div>

            <!-- Tehnologie -->
            <div>
                <label class="block text-sm text-slate-300 mb-2" data-i18n="tech_label">{{ t("tech_label") }}</label>

                <select
                    name="tehnologie"
                    required
                    class="w-full rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 text-white outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition"
                >
                    <option value="" data-i18n="select_default">{{ t("select_default") }}</option>
                    <option value="da" data-i18n="yes">{{ t("yes") }}</option>
                    <option value="nu" data-i18n="no">{{ t("no") }}</option>
                </select>
            </div>

            <!-- Terms -->
            <label class="flex items-start gap-3 text-sm text-slate-400">
                <input
                    type="checkbox"
                    required
                    class="mt-1 h-4 w-4 rounded border-slate-600 bg-slate-800 text-cyan-500 focus:ring-cyan-500"
                >

                <span data-i18n="terms_text">{{ t("terms_text") }}</span>
            </label>

            <!-- Button -->
            <button
                type="submit"
                class="w-full rounded-xl bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold hover:scale-105 active:scale-95 transition-all shadow-md hover:shadow-cyan-500/30 py-3 transition duration-300 shadow-lg shadow-cyan-500/20"
             data-i18n="register_button">{{ t("register_button") }}</button>

            <p class="text-center text-slate-400 text-sm">
                <span data-i18n="have_account">{{ t("have_account") }}</span>
                <a href="/login" class="text-cyan-400 hover:text-cyan-300 transition" data-i18n="authenticate">{{ t("authenticate") }}</a>
            </p>

        </form>
    </div>
</div>
{% endblock %}
